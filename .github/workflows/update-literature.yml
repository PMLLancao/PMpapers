name: Update literature data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

concurrency:
  group: update-literature-main
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run updater
        env:
          USER_EMAIL: pamunozl@um.uchile.cl
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/update_literature.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers.json data/meta.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update literature data"

      - name: Sync with latest main
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Push changes
        run: git push origin HEAD:main
