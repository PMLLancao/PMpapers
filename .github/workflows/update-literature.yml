name: Update literature data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

concurrency:
  group: update-literature
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run updater
        env:
          USER_EMAIL: pamunozl@um.uchile.cl
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/update_literature.py

      - name: Commit and force push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers.json data/meta.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update literature data"
          git push --force-with-lease origin main
